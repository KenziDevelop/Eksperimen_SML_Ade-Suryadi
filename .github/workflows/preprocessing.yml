name: Automate Data Preprocessing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# KUNCI JAWABANNYA ADA DI SINI:
# Kita memberikan izin kepada bot untuk menulis/menyimpan file ke repository
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Di-update ke versi terbaru (v4) agar peringatan Node.js hilang
      - name: Checkout repository
        uses: actions/checkout@v4 

      # Di-update ke versi terbaru (v5) agar peringatan Node.js hilang
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run preprocessing script
        working-directory: ./preprocessing
        run: python automate_ade_suryadi.py
          
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add preprocessing/heart_preprocessing.csv
          git commit -m "Automated data preprocessing" || echo "No changes to commit"
          git push
